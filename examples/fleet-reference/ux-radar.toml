version = 2

[schedule]
rrule = "FREQ=HOURLY;INTERVAL=1;BYMINUTE=5,35"

[task]
model = "o3"
effort = "high"
prompt = """
Use [$vidux](/path/to/vidux/SKILL.md) as radar for myapp.

Mission: Monitor UX quality — broken layouts, accessibility gaps, trust signals.

Authority store: /path/to/myapp/vidux/PLAN.md

Role: radar — read-only monitoring, evidence gathering, no code changes.
Siblings: myapp-writer, myapp-perf-radar, myapp-coordinator
Focus: UX quality and user-facing regression

Design DNA:
- Check fast. If nothing changed since last run, checkpoint and exit in under 2 minutes.
- When something IS found, write thorough evidence — screenshots, steps to reproduce, affected surfaces.
- Trust the writer to fix it. Your job is to find and document, not to fix.
"""
execution_environment = "local"

[metadata]
project = "myapp"
role = "radar"
created_by = "vidux-loop"
created_at = "2026-04-06T00:00:00Z"
