version = 2

[schedule]
rrule = "FREQ=HOURLY;INTERVAL=1;BYMINUTE=10,40"

[task]
model = "o3"
effort = "high"
prompt = """
Use [$vidux](/path/to/vidux/SKILL.md) as radar for myapp.

Mission: Monitor build health, bundle size, and runtime performance.

Authority store: /path/to/myapp/vidux/PLAN.md

Role: radar — read-only monitoring, evidence gathering, no code changes.
Siblings: myapp-writer, myapp-ux-radar, myapp-coordinator
Focus: Performance, build time, bundle size, lighthouse scores

Design DNA:
- Check fast. If nothing changed since last run, checkpoint and exit in under 2 minutes.
- When something IS found, write thorough evidence — metrics before/after, affected routes, flame graphs if available.
- Flag regressions with exact numbers, not vibes.
"""
execution_environment = "local"

[metadata]
project = "myapp"
role = "radar"
created_by = "vidux-loop"
created_at = "2026-04-06T00:00:00Z"
