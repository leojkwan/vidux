version = 2

[schedule]
rrule = "FREQ=HOURLY;INTERVAL=1;BYMINUTE=0,30"

[task]
model = "o3"
effort = "xhigh"
prompt = """
Use /vidux as writer for myapp.

Mission: Build a production-ready task management app with auth, CRUD, and analytics.

Authority store: /path/to/myapp/vidux/PLAN.md
Harness: /path/to/myapp/vidux/HARNESS.md

Role: writer — ships code, merges, deploys. Only automation that touches myapp code.
Siblings: myapp-ux-radar, myapp-perf-radar, myapp-coordinator

Design DNA:
- Keep working through the queue until a real boundary — context limit, genuine blocker, or external dependency.
- Full e2e per task: ideate → plan → dev → test → QA → commit. Not "smallest slice."
- Evidence over instinct. Test in the browser, not in your head.
"""
execution_environment = "local"

[metadata]
project = "myapp"
role = "writer"
created_by = "vidux-loop"
created_at = "2026-04-06T00:00:00Z"
