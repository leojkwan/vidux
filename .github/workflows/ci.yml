name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-tests:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pytest-timeout

      - name: Run contract tests
        run: python -m pytest tests/test_vidux_contracts.py -v --tb=short --timeout=30
        timeout-minutes: 8

  plan-gc-tests:
    name: Plan GC tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pytest-timeout

      - name: Run plan-gc tests
        run: python -m pytest tests/test_plan_gc.py -v --tb=short --timeout=30
        timeout-minutes: 3

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on scripts/
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

      - name: Run ShellCheck on hooks/
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: hooks
          severity: warning

  docs-structure:
    name: Doc structure
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Core docs exist
        run: |
          missing=0
          for f in SKILL.md DOCTRINE.md LOOP.md ENFORCEMENT.md INGREDIENTS.md \
                   README.md CONTRIBUTING.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "  OK: $f"
            fi
          done
          [ "$missing" -eq 0 ] && echo "All core docs present." || exit 1

      - name: Commands have frontmatter
        run: |
          errors=0
          for f in commands/*.md; do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "MISSING FRONTMATTER: $f"
              errors=1
            else
              echo "  OK: $f"
            fi
          done
          [ "$errors" -eq 0 ] && echo "All commands have frontmatter." || exit 1

      - name: Scripts are executable
        run: |
          errors=0
          for f in scripts/*.sh; do
            if [ ! -x "$f" ]; then
              echo "NOT EXECUTABLE: $f"
              errors=1
            else
              echo "  OK: $f"
            fi
          done
          [ "$errors" -eq 0 ] && echo "All scripts executable." || exit 1

      - name: Issue templates are valid YAML
        run: |
          pip install --quiet pyyaml
          python3 -c "
          import yaml, pathlib, sys
          errors = []
          for p in pathlib.Path('.github/ISSUE_TEMPLATE').glob('*.yml'):
              try:
                  yaml.safe_load(p.read_text())
                  print(f'  OK: {p}')
              except yaml.YAMLError as e:
                  errors.append(f'{p}: {e}')
                  print(f'  FAIL: {p}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All templates valid.')
          "
