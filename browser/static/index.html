<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>vidux browser</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <h1>vidux browser</h1>
    <div class="topbar-meta">
      <span id="meta-count">…</span>
      <button id="refresh" type="button" title="Re-scan">↻ refresh</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" id="sidebar" aria-label="plans">
      <div class="sidebar-search">
        <input id="filter" type="search" placeholder="filter (repo, slug, purpose)" />
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <p class="muted">loading…</p>
      </div>
    </aside>

    <section class="pane" id="pane">
      <div class="pane-empty muted">
        <p>Select a plan from the sidebar.</p>
        <p>40+ PLAN.md files indexed across <code>~/Development/</code>.</p>
      </div>
    </section>
  </main>
</body>
</html>
