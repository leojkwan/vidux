<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" fill="none">
  <style>
    .term-bg { fill: #1e1e2e; }
    .term-titlebar { fill: #181825; }
    .term-border { stroke: #313244; }
    @media (prefers-color-scheme: dark) { .term-border { stroke: #45475a; } }
    .text-base { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Menlo, Consolas, monospace; font-size: 13px; }
    .text-dim { fill: #6c7086; }
    .text-normal { fill: #cdd6f4; }
    .text-green { fill: #a6e3a1; }
    .text-blue { fill: #89b4fa; }
    .text-mauve { fill: #cba6f7; }
    .text-yellow { fill: #f9e2af; }
    .text-peach { fill: #fab387; }
    .text-teal { fill: #94e2d5; }
    .text-bold { font-weight: 600; }
    .text-title { fill: #bac2de; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; }
    .dot-red { fill: #f38ba8; }
    .dot-yellow { fill: #f9e2af; }
    .dot-green { fill: #a6e3a1; }
    .prompt-bg { fill: #11111b; }
    .prompt-border { stroke: #313244; }
    .cursor { fill: #cdd6f4; opacity: 0; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cursor { animation: blink 1.2s infinite; }
  </style>

  <rect class="term-bg" width="820" height="540" rx="10"/>
  <rect class="term-bg term-border" width="820" height="540" rx="10" stroke-width="1" fill="none"/>

  <rect class="term-titlebar" x="1" y="1" width="818" height="36" rx="10"/>
  <rect class="term-titlebar" x="1" y="27" width="818" height="10"/>
  <line x1="1" y1="37" x2="819" y2="37" class="term-border" stroke-width="0.5"/>
  <circle class="dot-red" cx="20" cy="19" r="6"/>
  <circle class="dot-yellow" cx="40" cy="19" r="6"/>
  <circle class="dot-green" cx="60" cy="19" r="6"/>
  <text class="text-title" x="410" y="23" text-anchor="middle">Claude Code</text>

  <rect class="prompt-bg prompt-border" x="16" y="48" width="788" height="32" rx="6" stroke-width="1"/>
  <text class="text-base" y="69" x="26">
    <tspan class="text-blue">&gt;</tspan>
    <tspan class="text-normal"> /vidux </tspan>
    <tspan class="text-yellow">"fix payment retry logic"</tspan>
  </text>

  <g class="text-base" transform="translate(16, 104)">
    <text y="0">
      <tspan class="text-blue text-bold">READ</tspan>
      <tspan class="text-dim">  PLAN.md, evidence/, git log</tspan>
    </text>
    <text y="20" class="text-dim">  Found [in_progress] task 3.1 -- resuming from crashed session</text>
    <text y="38" class="text-dim">  Evidence: Sentry #4821 (47 occurrences), grep retry_count=0</text>

    <text y="68">
      <tspan class="text-mauve text-bold">ASSESS</tspan>
      <tspan class="text-dim">  evidence exists, task has root cause</tspan>
    </text>
    <text y="86">
      <tspan class="text-dim">  Verdict: </tspan>
      <tspan class="text-green">ready to code</tspan>
      <tspan class="text-dim"> (skip plan refinement)</tspan>
    </text>

    <text y="116">
      <tspan class="text-peach text-bold">ACT</tspan>
    </text>
    <text y="134">
      <tspan class="text-dim">  Edited </tspan>
      <tspan class="text-yellow">src/payments/retry.ts</tspan>
      <tspan class="text-dim"> -- exponential backoff, max 3 attempts</tspan>
    </text>
    <text y="152">
      <tspan class="text-dim">  Edited </tspan>
      <tspan class="text-yellow">src/payments/retry.test.ts</tspan>
      <tspan class="text-dim"> -- 4 new test cases</tspan>
    </text>
    <text y="170">
      <tspan class="text-dim">  Updated </tspan>
      <tspan class="text-yellow">PLAN.md</tspan>
      <tspan class="text-dim"> -- task 3.1 [in_progress], Decision Log entry</tspan>
    </text>

    <text y="200">
      <tspan class="text-green text-bold">VERIFY</tspan>
    </text>
    <text y="218">
      <tspan class="text-dim">  build  </tspan>
      <tspan class="text-green">PASS</tspan>
      <tspan class="text-dim">    tests  </tspan>
      <tspan class="text-green">PASS</tspan>
      <tspan class="text-dim"> 51/51 (4 new)</tspan>
    </text>

    <text y="248">
      <tspan class="text-teal text-bold">CHECKPOINT</tspan>
    </text>
    <text y="266">
      <tspan class="text-dim">  Commit: </tspan>
      <tspan class="text-normal">vidux: fix payment retry -- exponential backoff</tspan>
    </text>
    <text y="284">
      <tspan class="text-dim">  PLAN.md: task 3.1 </tspan>
      <tspan class="text-green">[completed]</tspan>
    </text>
    <text y="302">
      <tspan class="text-dim">  Next: task 3.2 </tspan>
      <tspan class="text-normal">"add idempotency key to payment requests"</tspan>
    </text>

    <text y="340" class="text-dim">  -------</text>
    <text y="358">
      <tspan class="text-green text-bold">  1 task completed</tspan>
      <tspan class="text-dim"> | 2 files changed | 1 commit | </tspan>
      <tspan class="text-teal">next: task 3.2</tspan>
    </text>

    <text y="396">
      <tspan class="text-blue">&gt;</tspan>
      <tspan class="text-normal"> </tspan>
      <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>
