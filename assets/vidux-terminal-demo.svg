<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" fill="none">
  <style>
    @media (prefers-color-scheme: light) {
      .term-bg { fill: #1e1e2e; }
      .term-border { stroke: #313244; }
    }
    @media (prefers-color-scheme: dark) {
      .term-bg { fill: #1e1e2e; }
      .term-border { stroke: #45475a; }
    }
    .term-bg { fill: #1e1e2e; }
    .term-titlebar { fill: #181825; }
    .term-border { stroke: #313244; }
    .text-base { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Menlo, Consolas, monospace; font-size: 13px; }
    .text-dim { fill: #6c7086; }
    .text-normal { fill: #cdd6f4; }
    .text-green { fill: #a6e3a1; }
    .text-blue { fill: #89b4fa; }
    .text-mauve { fill: #cba6f7; }
    .text-yellow { fill: #f9e2af; }
    .text-peach { fill: #fab387; }
    .text-red { fill: #f38ba8; }
    .text-teal { fill: #94e2d5; }
    .text-bold { font-weight: 600; }
    .text-title { fill: #bac2de; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; }
    .dot-red { fill: #f38ba8; }
    .dot-yellow { fill: #f9e2af; }
    .dot-green { fill: #a6e3a1; }
    .cursor { fill: #cdd6f4; opacity: 0; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cursor { animation: blink 1.2s infinite; }
  </style>

  <!-- Window frame -->
  <rect class="term-bg" x="0" y="0" width="820" height="580" rx="10" ry="10"/>
  <rect class="term-bg term-border" x="0" y="0" width="820" height="580" rx="10" ry="10" stroke-width="1" fill="none"/>

  <!-- Title bar -->
  <rect class="term-titlebar" x="1" y="1" width="818" height="36" rx="10" ry="10"/>
  <rect class="term-titlebar" x="1" y="27" width="818" height="10"/>
  <line x1="1" y1="37" x2="819" y2="37" class="term-border" stroke-width="0.5"/>

  <!-- Traffic lights -->
  <circle class="dot-red" cx="20" cy="19" r="6"/>
  <circle class="dot-yellow" cx="40" cy="19" r="6"/>
  <circle class="dot-green" cx="60" cy="19" r="6"/>

  <!-- Title -->
  <text class="text-title" x="410" y="23" text-anchor="middle">vidux -- ~/projects/my-app</text>

  <!-- Terminal content -->
  <g class="text-base" transform="translate(16, 60)">
    <!-- Prompt line -->
    <text y="0">
      <tspan class="text-dim">$</tspan>
      <tspan class="text-normal"> /vidux </tspan>
      <tspan class="text-yellow">"fix auth token refresh bug"</tspan>
    </text>

    <!-- READ phase -->
    <text y="30">
      <tspan class="text-blue text-bold">  READ</tspan>
    </text>
    <text y="48" class="text-dim">  PLAN.md           3 tasks (1 completed, 2 pending)</text>
    <text y="66" class="text-dim">  git log           last commit 2h ago: "vidux: add retry logic"</text>
    <text y="84" class="text-dim">  git diff           clean working tree</text>

    <!-- ASSESS phase -->
    <text y="114">
      <tspan class="text-mauve text-bold">  ASSESS</tspan>
      <tspan class="text-dim">   ...</tspan>
    </text>
    <text y="132" class="text-dim">  Task 2.1: "auth token refresh fails silently"</text>
    <text y="150">
      <tspan class="text-dim">  Evidence: </tspan>
      <tspan class="text-teal">grep found retry_count=0 in auth.ts:47</tspan>
    </text>
    <text y="168">
      <tspan class="text-dim">  Verdict:  </tspan>
      <tspan class="text-green">evidence exists -- ready to code</tspan>
    </text>

    <!-- ACT phase -->
    <text y="198">
      <tspan class="text-peach text-bold">  ACT</tspan>
      <tspan class="text-dim">      ...</tspan>
    </text>
    <text y="216">
      <tspan class="text-dim">  </tspan>
      <tspan class="text-yellow">src/auth.ts</tspan>
      <tspan class="text-dim">      +12 -3  add exponential backoff to refresh()</tspan>
    </text>
    <text y="234">
      <tspan class="text-dim">  </tspan>
      <tspan class="text-yellow">src/auth.test.ts</tspan>
      <tspan class="text-dim"> +28 -0  test: retry 3x then surface error</tspan>
    </text>
    <text y="252">
      <tspan class="text-dim">  </tspan>
      <tspan class="text-yellow">PLAN.md</tspan>
      <tspan class="text-dim">          task 2.1 [pending] -> [in_progress]</tspan>
    </text>

    <!-- VERIFY phase -->
    <text y="282">
      <tspan class="text-green text-bold">  VERIFY</tspan>
      <tspan class="text-dim">   ...</tspan>
    </text>
    <text y="300">
      <tspan class="text-dim">  build    </tspan>
      <tspan class="text-green">PASS</tspan>
      <tspan class="text-dim">  0 errors, 0 warnings</tspan>
    </text>
    <text y="318">
      <tspan class="text-dim">  tests    </tspan>
      <tspan class="text-green">PASS</tspan>
      <tspan class="text-dim">  47/47 (3 new)</tspan>
    </text>
    <text y="336">
      <tspan class="text-dim">  lint     </tspan>
      <tspan class="text-green">PASS</tspan>
      <tspan class="text-dim">  no issues</tspan>
    </text>

    <!-- CHECKPOINT phase -->
    <text y="366">
      <tspan class="text-teal text-bold">  CHECKPOINT</tspan>
    </text>
    <text y="384">
      <tspan class="text-dim">  commit   </tspan>
      <tspan class="text-normal">vidux: fix auth token refresh -- exponential backoff</tspan>
    </text>
    <text y="402">
      <tspan class="text-dim">  plan     </tspan>
      <tspan class="text-normal">task 2.1 [in_progress] -> [completed]</tspan>
    </text>
    <text y="420">
      <tspan class="text-dim">  next     </tspan>
      <tspan class="text-normal">task 2.2: "add refresh token rotation"</tspan>
    </text>

    <!-- Summary line -->
    <text y="456">
      <tspan class="text-dim">  ---</tspan>
    </text>
    <text y="474">
      <tspan class="text-green text-bold">  1 task completed</tspan>
      <tspan class="text-dim"> | </tspan>
      <tspan class="text-normal">2 files changed</tspan>
      <tspan class="text-dim"> | </tspan>
      <tspan class="text-normal">1 commit</tspan>
      <tspan class="text-dim"> | </tspan>
      <tspan class="text-teal">next: task 2.2</tspan>
    </text>

    <!-- New prompt -->
    <text y="504">
      <tspan class="text-dim">$</tspan>
      <tspan class="text-normal"> </tspan>
      <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>